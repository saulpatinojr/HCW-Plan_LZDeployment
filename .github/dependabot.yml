version: 2
updates:
  # GitHub Actions dependency updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    open-pull-requests-limit: 10
    reviewers:
      - "saulpatinojr"
    labels:
      - "dependencies"
      - "github-actions"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group all GitHub Actions updates in a single PR
    groups:
      github-actions:
        patterns:
          - "*"

  # Terraform dependency updates
  - package-ecosystem: "terraform"
    directory: "/terraform/backend-bootstrap"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    open-pull-requests-limit: 5
    reviewers:
      - "saulpatinojr"
    labels:
      - "dependencies"
      - "terraform"
      - "infrastructure"
    commit-message:
      prefix: "chore(terraform)"
      include: "scope"

  - package-ecosystem: "terraform"
    directory: "/terraform/modules/hub-network"
    schedule:
      interval: "weekly"
      day: "monday"
