name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      layer:
        description: 'Layer to deploy'
        required: true
        type: choice
        options:
          - global
          - platform-connectivity
          - platform-management
          - workloads-prod
          - sandbox
          - all

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  detect-changes:
    name: Detect Changed Layers
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      layers: ${{ steps.detect.outputs.layers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Detect changed layers
        id: detect
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep '^terraform/live/' || true)
          
          LAYERS=()
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/global/'; then
            LAYERS+=("global")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/platform-connectivity/'; then
            LAYERS+=("platform-connectivity")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/platform-management/'; then
            LAYERS+=("platform-management")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/workloads-prod/'; then
            LAYERS+=("workloads-prod")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/sandbox/'; then
            LAYERS+=("sandbox")
          fi
          
          LAYERS_JSON=$(printf '%s\n' "${LAYERS[@]}" | jq -R . | jq -s -c .)
          echo "layers=$LAYERS_JSON" >> $GITHUB_OUTPUT
          echo "Changed layers: $LAYERS_JSON"

  terraform-apply:
    name: Apply ${{ matrix.layer }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.layers != '[]')
    strategy:
      matrix:
        layer: ${{ 
          github.event_name == 'workflow_dispatch' && 
          (github.event.inputs.layer == 'all' && 
           fromJson('["global", "platform-connectivity", "platform-management", "workloads-prod", "sandbox"]') || 
           fromJson(format('["{0}"]', github.event.inputs.layer))) || 
          fromJson(needs.detect-changes.outputs.layers) 
        }}
      max-parallel: 1  # Sequential deployment to respect dependencies
    
    environment:
      name: ${{ matrix.layer == 'sandbox' && 'sandbox' || 'production' }}
      url: https://portal.azure.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Init
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform init -backend-config=backend.hcl
      
      - name: Terraform Validate
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform validate
      
      - name: Terraform Apply
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform apply -input=false -auto-approve
      
      - name: Terraform Output
        working-directory: terraform/live/${{ matrix.layer }}
        id: outputs
        run: |
          terraform output -json > outputs.json
          cat outputs.json
      
      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.layer }}
          path: terraform/live/${{ matrix.layer }}/outputs.json
          retention-days: 90
