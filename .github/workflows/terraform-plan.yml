name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  rbac-validation:
    name: RBAC Security Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 (Finding 5.1)

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v2.1.1 (Finding 5.1)
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Service Principal RBAC (Finding 1.1 - CVSS 9.1)
        run: |
          echo "## 🔐 Service Principal RBAC Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get current SP role assignments
          ROLE_ASSIGNMENTS=$(az role assignment list \
            --assignee ${{ secrets.AZURE_CLIENT_ID }} \
            --all \
            --query "[].{Role:roleDefinitionName, Scope:scope}" \
            --output json)
          
          echo "### Current Role Assignments:" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$ROLE_ASSIGNMENTS" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for Owner role (CRITICAL SECURITY VIOLATION)
          OWNER_COUNT=$(echo "$ROLE_ASSIGNMENTS" | jq '[.[] | select(.Role == "Owner")] | length')
          
          if [ "$OWNER_COUNT" -gt 0 ]; then
            echo "❌ **CRITICAL SECURITY VIOLATION**: Service Principal has Owner role" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Risk**: CVSS 9.1 - Can escalate privileges and modify RBAC" >> $GITHUB_STEP_SUMMARY
            echo "**Required Action**: Remove Owner, assign Contributor only" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '**Remediation**:' >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "az role assignment delete --assignee ${{ secrets.AZURE_CLIENT_ID }} --role Owner" >> $GITHUB_STEP_SUMMARY
            echo "az role assignment create --assignee ${{ secrets.AZURE_CLIENT_ID }} --role Contributor --scope /subscriptions/\$SUBSCRIPTION_ID" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **PASS**: No Owner role assignments" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for Contributor role
          CONTRIBUTOR_COUNT=$(echo "$ROLE_ASSIGNMENTS" | jq '[.[] | select(.Role == "Contributor")] | length')
          
          if [ "$CONTRIBUTOR_COUNT" -gt 0 ]; then
            echo "✅ **PASS**: Service principal has Contributor role" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  **WARNING**: No Contributor role - deployments may fail" >> $GITHUB_STEP_SUMMARY
          fi

  detect-changes:
    name: Detect Changed Layers
    runs-on: ubuntu-latest
    needs: rbac-validation
    outputs:
      layers: ${{ steps.detect.outputs.layers }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4.1.1 (Finding 5.1)
        with:
          fetch-depth: 0
      
      - name: Detect changed layers
        id: detect
        run: |
          # Detect which Terraform layers changed
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '^terraform/live/' || true)
          
          LAYERS=()
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/global/'; then
            LAYERS+=("global")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/platform-connectivity/'; then
            LAYERS+=("platform-connectivity")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/platform-management/'; then
            LAYERS+=("platform-management")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/workloads-prod/'; then
            LAYERS+=("workloads-prod")
          fi
          if echo "$CHANGED_FILES" | grep -q 'terraform/live/sandbox/'; then
            LAYERS+=("sandbox")
          fi
          
          # Convert array to JSON
          LAYERS_JSON=$(printf '%s\n' "${LAYERS[@]}" | jq -R . | jq -s -c .)
          echo "layers=$LAYERS_JSON" >> $GITHUB_OUTPUT
          echo "Changed layers: $LAYERS_JSON"

  terraform-plan:
    name: Plan ${{ matrix.layer }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.layers != '[]'
    strategy:
      matrix:
        layer: ${{ fromJson(needs.detect-changes.outputs.layers) }}
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4.1.1 (Finding 5.1)
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v3.1.2 (Finding 5.1)
        with:
          terraform_version: 1.9.0
      
      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v2.1.1 (Finding 5.1)
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Format Check
        id: fmt
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform init -backend-config=backend.hcl
      
      - name: Terraform Validate
        id: validate
        working-directory: terraform/live/${{ matrix.layer }}
        run: terraform validate
      
      - name: Terraform Plan
        working-directory: terraform/live/${{ matrix.layer }}
        id: plan
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt
        continue-on-error: true
      
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: tfplan-${{ matrix.layer }}
          path: terraform/live/${{ matrix.layer }}/tfplan
          retention-days: 30
      
      - name: Comment PR with Plan
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planPath = 'terraform/live/${{ matrix.layer }}/plan.txt';
            const plan = fs.readFileSync(planPath, 'utf8');
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '\n\n... (truncated)' : plan;
            
            const output = `### Terraform Plan: \`${{ matrix.layer }}\`
            
            #### Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Plan 📖\`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform
            ${truncatedPlan}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
