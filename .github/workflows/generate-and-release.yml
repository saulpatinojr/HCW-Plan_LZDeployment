name: Generate and Release ALZ Configuration

on:
  workflow_dispatch:
    inputs:
      org_prefix:
        description: 'Organization prefix (3-8 chars, lowercase)'
        required: true
        type: string
      modules:
        description: 'Modules to deploy (comma-separated: hub-network,spoke-network,policy-baseline,backup-baseline,defender-baseline)'
        required: true
        type: string
        default: 'hub-network,spoke-network,policy-baseline'
      compliance_variant:
        description: 'Compliance variant (baseline, pci-dss, hipaa, fedramp)'
        required: true
        type: choice
        options:
          - baseline
          - pci-dss
          - hipaa
          - fedramp
      primary_region:
        description: 'Primary Azure region'
        required: true
        type: string
        default: 'eastus'
      secondary_region:
        description: 'Secondary Azure region (for DR)'
        required: true
        type: string
        default: 'westus'

jobs:
  compose-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate inputs
        run: |
          if ! [[ "${{ github.event.inputs.org_prefix }}" =~ ^[a-z]{3,8}$ ]]; then
            echo "❌ org_prefix must be 3-8 lowercase letters"
            exit 1
          fi
          echo "✅ Inputs validated"

      - name: Setup PowerShell
        run: |
          pwsh -Version 7.0
          echo "✅ PowerShell 7 ready"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: '~> 1.9'

      - name: Run Compose-TerraformPackage Script
        run: |
          pwsh -File terraform/compose-package/Compose-TerraformPackage.ps1 `
            -OrgPrefix "${{ github.event.inputs.org_prefix }}" `
            -Modules @("${{ github.event.inputs.modules }}".Split(',')) `
            -ComplianceVariant "${{ github.event.inputs.compliance_variant }}" `
            -PrimaryRegion "${{ github.event.inputs.primary_region }}" `
            -SecondaryRegion "${{ github.event.inputs.secondary_region }}"

      - name: Terraform Format Check
        run: |
          cd terraform/live/${{ github.event.inputs.org_prefix }}
          echo "🔍 Checking Terraform code format..."
          terraform fmt -check -recursive .
          echo "✅ Format check passed"

      - name: Terraform Validate
        run: |
          cd terraform/live/${{ github.event.inputs.org_prefix }}
          echo "🔍 Validating Terraform syntax..."
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform validation passed"

      - name: Terraform Plan (Dry-Run)
        id: plan
        run: |
          cd terraform/live/${{ github.event.inputs.org_prefix }}
          echo "📋 Running Terraform plan (dry-run)..."
          terraform plan -var-file=terraform.tfvars -out=tfplan.binary 2>&1 | tee tfplan.log
          terraform show tfplan.binary -json > tfplan.json
          echo "✅ Terraform plan completed"
        continue-on-error: true

      - name: Comment on Plan (if applicable)
        if: always()
        run: |
          cd terraform/live/${{ github.event.inputs.org_prefix }}
          PLAN_STATUS="✅ Plan succeeded"
          if [ -f tfplan.log ]; then
            PLAN_SUMMARY=$(head -20 tfplan.log)
            echo "$PLAN_SUMMARY"
          fi
          echo "$PLAN_STATUS"

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          tag: "v1.0.0-${{ github.event.inputs.org_prefix }}-${{ github.event.inputs.compliance_variant }}-${{ github.run_number }}"
          name: "ALZ Deployment: ${{ github.event.inputs.org_prefix }}"
          body: |
            # Azure Landing Zone Deployment Package

            **Organization:** ${{ github.event.inputs.org_prefix }}
            **Modules:** ${{ github.event.inputs.modules }}
            **Compliance:** ${{ github.event.inputs.compliance_variant }}
            **Primary Region:** ${{ github.event.inputs.primary_region }}
            **Secondary Region:** ${{ github.event.inputs.secondary_region }}
            **Created Run ID:** ${{ github.run_id }}

            ## Next Steps

            1. Review the generated Terraform configuration in `terraform/live/${{ github.event.inputs.org_prefix }}/`
            2. Update `terraform.tfvars` with your specific values
            3. Trigger the deployment workflow to deploy to your Azure subscription

            ## Artifacts

            The following files have been generated and are included in this release:
            - `main.tf` - Composed Terraform configuration
            - `variables.tf` - Input variables
            - `terraform.tfvars` - Variable values (EDIT THIS)
            - `backend.hcl` - Terraform Cloud backend config
            - `deployment-manifest.yaml` - Metadata about this deployment
          artifacts: "terraform/live/${{ github.event.inputs.org_prefix }}/**/*.tf,terraform/live/${{ github.event.inputs.org_prefix }}/*.tfvars,terraform/live/${{ github.event.inputs.org_prefix }}/*.hcl"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post success message
        run: |
          echo "✅ Release created: v1.0.0-${{ github.event.inputs.org_prefix }}-${{ github.event.inputs.compliance_variant }}-${{ github.run_number }}"
          echo "📦 Terraform code generated in: terraform/live/${{ github.event.inputs.org_prefix }}/"
          echo "🚀 Next: Trigger 'Deploy from Release' workflow to deploy to Azure"
