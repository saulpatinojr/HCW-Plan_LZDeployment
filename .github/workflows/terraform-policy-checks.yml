name: Terraform Policy Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
      - ".github/workflows/terraform-policy-checks.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"
      - ".github/workflows/terraform-policy-checks.yml"

permissions:
  contents: read

jobs:
  fmt-validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.9.0

      - name: Terraform fmt (fail-fast)
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate modules (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          for d in terraform/modules/*; do
            [ -d "$d" ] || continue
            echo "Validating module: $d"
            terraform -chdir="$d" init -backend=false -input=false -no-color >/dev/null
            terraform -chdir="$d" validate -no-color
          done

      - name: Terraform validate live stacks (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          for d in terraform/live/*; do
            [ -d "$d" ] || continue
            echo "Validating stack: $d"
            terraform -chdir="$d" init -backend=false -input=false -no-color >/dev/null
            terraform -chdir="$d" validate -no-color
          done

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6

      - name: Init TFLint plugins
        run: tflint --chdir=terraform --init

      - name: Run TFLint on modules (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          for d in terraform/modules/*; do
            [ -d "$d" ] || continue
            echo "Linting module: $d"
            tflint --chdir="$d"
          done

      - name: Run TFLint on live stacks (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          for d in terraform/live/*; do
            [ -d "$d" ] || continue
            echo "Linting stack: $d"
            tflint --chdir="$d"
          done

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: tfsec scan (fail-fast)
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6
        with:
          working_directory: terraform/
          soft_fail: false
