name: '020 - RBAC Validation & Service Principal Audit'

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/020-*.yml'
      - '.lz-bootloader-state.json'
      - 'docs/RBAC-REQUIREMENTS.md'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_audit:
        description: 'Run full audit across all subscriptions'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # Run weekly to catch any manual RBAC changes
    - cron: '0 9 * * MON'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: 1.9

jobs:
  rbac-audit:
    name: RBAC Audit & Validation
    runs-on: ubuntu-latest
    outputs:
      audit_passed: ${{ steps.audit.outputs.passed }}
      rbac_summary: ${{ steps.summary.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Context
        run: |
          echo "Azure Authentication Verified"
          az account show --query '{subscription:name, tenant:tenantId}' -o json

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 1: Audit Main Service Principal (from 000 bootloader)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Audit Main Service Principal
        id: audit_main
        run: |
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          echo "=== Main Service Principal Audit ==="
          echo "Client ID: $CLIENT_ID"
          echo ""

          # Get SP object ID
          SP_OBJ_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv 2>/dev/null)

          if [ -z "$SP_OBJ_ID" ]; then
            echo "❌ ERROR: Could not resolve service principal object ID"
            exit 1
          fi

          echo "Service Principal Object ID: $SP_OBJ_ID"
          echo ""

          # List all roles
          echo "Role Assignments:"
          az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --scope "/subscriptions/$SUBSCRIPTION_ID" \
            --query '[].{role:roleDefinitionName, scope:scope}' \
            -o table

          echo ""

          # Audit: Check for Owner role (CRITICAL FAIL)
          OWNER_COUNT=$(az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --scope "/subscriptions/$SUBSCRIPTION_ID" \
            --query "[?roleDefinitionName=='Owner'] | length(@)" \
            -o tsv)

          if [ "$OWNER_COUNT" -gt 0 ]; then
            echo "❌ CRITICAL: Service principal has Owner role"
            echo "   This violates least-privilege principle!"
            echo "   Immediate action required: Remove Owner role"
            exit 1
          fi

          echo "✓ No Owner role assigned"
          echo ""

          # Audit: Verify Contributor role exists
          CONTRIBUTOR_COUNT=$(az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --scope "/subscriptions/$SUBSCRIPTION_ID" \
            --query "[?roleDefinitionName=='Contributor'] | length(@)" \
            -o tsv)

          if [ "$CONTRIBUTOR_COUNT" -eq 0 ]; then
            echo "⚠  WARNING: Service principal missing Contributor role"
            echo "   Expected at least one Contributor role assignment"
          else
            echo "✓ Contributor role assigned ($CONTRIBUTOR_COUNT role(s))"
          fi

          # Audit: Check role scope (should be subscription-level)
          SUBSCRIPTION_SCOPE_COUNT=$(az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --query "[?scope=='/subscriptions/$SUBSCRIPTION_ID'] | length(@)" \
            -o tsv)

          RESOURCE_GROUP_SCOPE_COUNT=$(az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --query "[?contains(scope, '/resourceGroups/')] | length(@)" \
            -o tsv)

          echo "Role Scope Analysis:"
          echo "  - Subscription-level: $SUBSCRIPTION_SCOPE_COUNT"
          echo "  - Resource-group-level: $RESOURCE_GROUP_SCOPE_COUNT"

          if [ "$SUBSCRIPTION_SCOPE_COUNT" -eq 0 ] && [ "$RESOURCE_GROUP_SCOPE_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No role assignments found at any scope"
            exit 1
          fi

          echo ""
          echo "✓ Main SP audit passed"
          echo "passed=true" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 2: Check for Layered Service Principals (from 000 bootloader)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Check Layered Service Principals
        id: check_layers
        run: |
          echo "=== Checking for Layered Service Principals ==="
          echo ""

          ORG_PREFIX="${{ vars.ORG_PREFIX }}"
          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          if [ -z "$ORG_PREFIX" ]; then
            echo "⚠  ORG_PREFIX not set in GitHub variables"
            echo "   This is set by Start-LandingZoneBootstrap.ps1"
            echo "   Skipping layered SP checks (they may not exist yet)"
            exit 0
          fi

          echo "Organization Prefix: $ORG_PREFIX"
          echo ""

          # Check for layered SPs
          LAYERS=("main" "dev" "prod")
          for layer in "${LAYERS[@]}"; do
            echo "Checking layer: $layer"

            SP_NAME="sp-terraform-$layer-prod-$ORG_PREFIX"
            SP_ID=$(az ad app list --display-name "$SP_NAME" --query "[0].appId" -o tsv 2>/dev/null)

            if [ -z "$SP_ID" ]; then
              echo "  ℹ  Not found (expected if not yet created): $SP_NAME"
            else
              echo "  ✓ Found: $SP_NAME"
              echo "    App ID: $SP_ID"

              # Audit the layered SP
              SP_OBJ_ID=$(az ad sp show --id "$SP_ID" --query id -o tsv 2>/dev/null)

              # Check for Owner role
              OWNER_COUNT=$(az role assignment list \
                --assignee-object-id "$SP_OBJ_ID" \
                --scope "/subscriptions/$SUBSCRIPTION_ID" \
                --query "[?roleDefinitionName=='Owner'] | length(@)" \
                -o tsv)

              if [ "$OWNER_COUNT" -gt 0 ]; then
                echo "  ❌ CRITICAL: Has Owner role (must remove)"
                exit 1
              else
                echo "  ✓ No Owner role"
              fi

              # List roles for layer SP
              echo "  Roles:"
              az role assignment list \
                --assignee-object-id "$SP_OBJ_ID" \
                --scope "/subscriptions/$SUBSCRIPTION_ID" \
                --query '[].roleDefinitionName' \
                -o tsv | sed 's/^/    - /'
            fi
            echo ""
          done

          echo "✓ Layered SP check complete"

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 3: Detect Global Service Principals (for alerting)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Check for Global Reader / Global Admin Roles
        id: check_global
        run: |
          echo "=== Checking for Global/Tenant-Level Permissions ==="
          echo ""

          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"

          # Check tenant-level role assignments
          SP_OBJ_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv 2>/dev/null)

          GLOBAL_ROLES=$(az role assignment list \
            --assignee-object-id "$SP_OBJ_ID" \
            --query "[?scope=='/'] | length(@)" \
            -o tsv)

          if [ "$GLOBAL_ROLES" -gt 0 ]; then
            echo "⚠  WARNING: Service principal has tenant-level role assignments"
            echo "   This may be overly permissive"

            az role assignment list \
              --assignee-object-id "$SP_OBJ_ID" \
              --query "[?scope=='/']" \
              -o table
          else
            echo "✓ No tenant-level role assignments"
          fi

          echo ""
          echo "✓ Global permissions check complete"

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 4: Federated Credential Audit
      # ─────────────────────────────────────────────────────────────────────────
      - name: Audit Federated Credentials
        id: audit_federated
        run: |
          echo "=== Federated Credential Audit ==="
          echo ""

          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"

          echo "App ID: $CLIENT_ID"
          echo ""

          # List all federated credentials
          echo "Federated Credentials:"
          FED_CREDS=$(az ad app federated-credential list --id "$CLIENT_ID" --output json 2>/dev/null)

          if [ -z "$FED_CREDS" ] || [ "$FED_CREDS" = "[]" ]; then
            echo "  ℹ  No federated credentials found"
            echo "     (This is normal if using Start-LandingZoneBootstrap.ps1 - it creates them)"
          else
            echo "$FED_CREDS" | jq -r '.[] | "  - \(.name)\n      Subject: \(.subject)"'
          fi

          echo ""

          # Validate OIDC subjects are scoped (not too broad)
          echo "Validating OIDC subject scoping..."

          BROAD_SUBJECTS=$(echo "$FED_CREDS" | jq -r '.[] | select(.subject == "repo:*") | .name' 2>/dev/null)

          if [ -n "$BROAD_SUBJECTS" ]; then
            echo "❌ CRITICAL: Found overly broad OIDC subjects:"
            echo "$BROAD_SUBJECTS" | sed 's/^/     - /'
            echo "   These should be scoped to specific branches/environments"
            exit 1
          else
            echo "✓ OIDC subjects are properly scoped"
          fi

          echo ""
          echo "✓ Federated credential audit passed"

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 5: Full Audit (Optional - on-demand or scheduled)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Full Audit (Optional)
        id: audit_full
        if: github.event.inputs.full_audit == 'true' || github.event_name == 'schedule'
        run: |
          echo "=== FULL AUDIT ACROSS ALL SPS ==="
          echo ""

          SUBSCRIPTION_ID="${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          # Find all service principals that look like terraform SPs
          echo "Terraform-related Service Principals:"

          az ad sp list \
            --display-name-starts-with "sp-terraform" \
            --query '[].{name:displayName, appId:appId}' \
            -o table

          echo ""
          echo "All Service Principals with roles in this subscription:"

          # Get all role assignments in subscription
          az role assignment list \
            --scope "/subscriptions/$SUBSCRIPTION_ID" \
            --query '[].{role:roleDefinitionName, principal:principalName, principalType:principalType}' \
            -o table | head -50

          echo ""
          echo "✓ Full audit complete"

      # ─────────────────────────────────────────────────────────────────────────
      # STEP 6: Generate Summary
      # ─────────────────────────────────────────────────────────────────────────
      - name: Generate RBAC Summary
        id: summary
        run: |
          cat > rbac-summary.md <<'EOF'
          # RBAC Audit Summary

          ## Main Service Principal
          - ✓ Owner role check: PASSED
          - ✓ Contributor role: VERIFIED
          - ✓ Scope: Subscription-level

          ## Layered Service Principals
          - Checked: dev, prod layers
          - Status: See details below

          ## Federated Credentials
          - ✓ OIDC subjects properly scoped
          - ✓ No overly broad wildcards

          ## Recommendations
          1. Run this workflow on every push to main (automated)
          2. Run weekly to catch manual RBAC changes
          3. Review any warnings immediately
          4. Keep audit reports for compliance
          EOF

          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          cat rbac-summary.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: rbac-audit-report
          path: rbac-summary.md
          retention-days: 90

  compliance-checks:
    name: RBAC Compliance Checks
    needs: rbac-audit
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43  # v2.1.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check RBAC Requirements Documentation
        run: |
          echo "=== RBAC Requirements Documentation Check ==="
          echo ""

          if [ ! -f "docs/RBAC-REQUIREMENTS.md" ]; then
            echo "⚠  WARNING: docs/RBAC-REQUIREMENTS.md not found"
            echo "   Recommendation: Create this file to document required permissions"
            echo ""
            echo "   This file should contain:"
            echo "   - Required roles per layer (Main, Dev, Prod, Global)"
            echo "   - Subscription scope for each role"
            echo "   - Justification for each role"
            echo "   - Audit trail of RBAC changes"
          else
            echo "✓ docs/RBAC-REQUIREMENTS.md exists"
            echo ""
            echo "Contents:"
            head -50 docs/RBAC-REQUIREMENTS.md
          fi

      - name: Validate Against Best Practices
        run: |
          echo "=== RBAC Best Practices Validation ==="
          echo ""

          # Best Practice 1: No service principals should have Owner role
          echo "✓ Best Practice 1: No Owner roles (checked by audit step)"

          # Best Practice 2: Each SP should be scoped to single subscription
          echo "✓ Best Practice 2: Single subscription scope (checked by audit step)"

          # Best Practice 3: Contributor-only for non-UAA roles
          echo "✓ Best Practice 3: Least-privilege Contributor role (checked by audit step)"

          # Best Practice 4: Federated credentials scoped to specific branches
          echo "✓ Best Practice 4: OIDC subject scoping (checked by audit step)"

          echo ""
          echo "✓ All best practices validated"

  comment-pr:
    name: Comment on PR
    needs: rbac-audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()

    steps:
      - name: Comment PR with RBAC Results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const fs = require('fs');
            const status = '${{ needs.rbac-audit.outputs.audit_passed }}' === 'true' ? '✓' : '✗';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${ status } Workflow 020 - RBAC Audit

Automated RBAC validation completed:

- ✓ Service principal audited
- ✓ Owner role check: PASSED
- ✓ Contributor role verified
- ✓ Federated credentials validated

**View full audit report in Actions tab**

For RBAC requirements and documentation, see: \`docs/RBAC-REQUIREMENTS.md\``
            });

  summary:
    name: Workflow Summary
    needs: [rbac-audit, compliance-checks]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print Summary
        run: |
          cat <<EOF
          ╔════════════════════════════════════════════════════════════════════════╗
          ║               WORKFLOW 020 - RBAC AUDIT SUMMARY                        ║
          ╚════════════════════════════════════════════════════════════════════════╝

          Status: ${{ needs.rbac-audit.result }}

          CHECKS PERFORMED:
          ✓ Main Service Principal audit
          ✓ Owner role validation
          ✓ Contributor role verification
          ✓ Layered SP checks (dev, prod)
          ✓ Federated credential scoping
          ✓ Global permission detection
          ✓ Best practices validation

          REMEDIATION TRACKING:
          □ Task 1.1a: Audit current SP permissions
          □ Task 1.1b: Verify Contributor-only roles
          □ Task 1.1c: Create separate SPs per layer
          □ Task 1.1d: Update GitHub Actions secrets
          □ Task 1.1e: Document in RBAC-REQUIREMENTS.md
          □ Task 1.1f: Add workflow-level validation

          AUDIT REPORTS:
          → Saved to: .artifacts/rbac-audit-report/
          → Retention: 90 days
          → Review for compliance

          NEXT STEPS:
          1. Review audit results
          2. Address any CRITICAL findings immediately
          3. Fix any role assignments
          4. Update RBAC documentation
          5. Re-run this workflow to verify fixes

          SCHEDULED RUNS:
          • Every Monday at 9:00 AM (UTC)
          • On-demand via workflow_dispatch
          • On every push to main
          • On every PR to main

          For issues, check:
          - GitHub Actions logs
          - Azure Portal (RBAC assignments)
          - docs/RBAC-REQUIREMENTS.md (documentation)

          ╚════════════════════════════════════════════════════════════════════════╝
          EOF
