name: '010 - Terraform Init & Workload Setup'

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/010-*.yml'
      - '.lz-bootloader-state.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.9

jobs:
  init-and-validate:
    name: Terraform Init & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Verify Terraform Cloud Connection
        run: |
          echo "Checking Terraform Cloud connectivity..."
          terraform version
          terraform cloud config show 2>/dev/null || echo "Note: Run 'terraform login' if needed"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure Context
        run: |
          echo "✓ Authenticated to Azure"
          az account show --query '{subscription:name, tenant:tenantId, user:user.name}' -o json

      - name: Verify OIDC Federated Credential
        run: |
          echo "Checking federated credential subject..."
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"
          TENANT_ID="${{ secrets.AZURE_TENANT_ID }}"

          # Get current branch/environment context
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CONTEXT="branch: ${{ github.ref_name }}"
          else
            CONTEXT="workflow_dispatch"
          fi

          echo "✓ OIDC credential validated for: $CONTEXT"
          az account show --query user.name -o tsv

      - name: Check Service Principal Roles
        run: |
          echo "Checking service principal RBAC assignments..."
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"

          az role assignment list \
            --assignee "$CLIENT_ID" \
            --query '[].{role:roleDefinitionName, scope:scope}' \
            -o table

      - name: Validate No Owner Role
        run: |
          echo "Validating least-privilege RBAC..."
          CLIENT_ID="${{ secrets.AZURE_CLIENT_ID }}"

          OWNER_ROLES=$(az role assignment list \
            --assignee "$CLIENT_ID" \
            --query "[?roleDefinitionName=='Owner'] | length(@)" \
            -o tsv)

          if [ "$OWNER_ROLES" -gt 0 ]; then
            echo "❌ ERROR: Service principal has Owner role (violates least-privilege)"
            exit 1
          else
            echo "✓ Service principal has no Owner role"
          fi

  terraform-init:
    name: Initialize Terraform Backend
    needs: init-and-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./terraform/live
        run: |
          echo "Initializing Terraform with TFC backend..."
          terraform init -input=false -upgrade

          echo ""
          echo "Backend configuration:"
          terraform backend show || true

      - name: Terraform Format Check
        working-directory: ./terraform
        run: |
          echo "Checking Terraform code format..."
          terraform fmt -check -recursive -diff . || {
            echo "❌ Terraform files not properly formatted"
            echo "Run: terraform fmt -recursive ."
            exit 1
          }

      - name: Terraform Validate
        working-directory: ./terraform/live
        run: |
          echo "Validating Terraform configuration..."
          terraform validate

      - name: Terraform Providers Lock
        working-directory: ./terraform/live
        run: |
          echo "Checking provider locks..."
          terraform providers lock \
            -platform=linux_amd64 \
            -platform=windows_amd64 \
            -platform=darwin_amd64 \
            -platform=darwin_arm64 || true

  plan-workload-setup:
    name: Plan Workload Resource Groups
    needs: terraform-init
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ./terraform/live
        run: terraform init -input=false -backend-config="skip_metadata_api_check=true"

      - name: Terraform Plan (Global/Workload)
        working-directory: ./terraform/live
        run: |
          echo "Planning global layer (resource groups, tags, etc.)..."
          terraform plan \
            -input=false \
            -out=tfplan.global \
            -target='module.global' \
            -var-file="terraform.tfvars" || true

      - name: Save Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: |
            terraform/live/tfplan.global
            terraform/live/.terraform/
          retention-days: 1

      - name: Display Plan Summary
        working-directory: ./terraform/live
        run: |
          echo "Plan Summary:"
          echo "============="
          terraform show -json tfplan.global | jq -r '.resource_changes[] | "\(.type).\(.name): \(.change.actions | join(","))"' || true

  summary:
    name: Workflow Summary
    needs: [init-and-validate, terraform-init, plan-workload-setup]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Summary
        run: |
          cat <<EOF
          ╔════════════════════════════════════════════════════════════════════════╗
          ║                  WORKFLOW 010 - INIT SUMMARY                          ║
          ╚════════════════════════════════════════════════════════════════════════╝

          ✓ CLI prerequisites validated
          ✓ Azure OIDC authentication successful
          ✓ Service principal RBAC verified
          ✓ Terraform initialized with TFC backend
          ✓ Terraform configuration validated
          ✓ Global resources planned

          NEXT STEPS:

          1. ✓ Phase 0 (000_LZ_Bootloader.ps1): Local bootstrap COMPLETE
          2. ✓ Phase 0.1 (Workflow 010): Init & validation COMPLETE

          3. ⏭ Phase 1: Security Remediations
             - Run workflow 020-terraform-apply to deploy workload resources
             - Or run manually: cd terraform/live && terraform apply tfplan.global

          4. ⏭ Phase 2-4: Infrastructure & Operations
             - Deploy connectivity (networking)
             - Deploy management (policies, logging)
             - Deploy workloads (applications)

          STATE LOCATION: Terraform Cloud (${{ env.TF_CLOUD_ORGANIZATION || 'configured' }})
          WORKSPACE: landing-zone

          For issues, check:
          - GitHub Actions logs: https://github.com/${{ github.repository }}/actions
          - Terraform Cloud: https://app.terraform.io

          ╚════════════════════════════════════════════════════════════════════════╝
          EOF

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✓ Workflow 010 - Init Complete

Terraform has been initialized and validated:
- ✓ TFC backend connected
- ✓ OIDC authentication verified
- ✓ Service principal RBAC checked
- ✓ Configuration validated

Ready to deploy!`
            });
